<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KitchenMetrics – Jefe de Cocina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_dashboard.css') }}">
    <style>
        /* ── JC-specific overrides ── */
        .sidebar { background: rgba(230,126,34,0.13); border-right: 1px solid rgba(230,126,34,0.22); }
        .sidebar .brand { color: #e67e22; }
        .nav-list .nav-item.active a { background: rgba(230,126,34,0.22); border-left-color: #e67e22; }
        .topbar { background: rgba(230,126,34,0.08); }
        .topbar h2 { color: #fff; }
    </style>
</head>
<body>
<div class="dashboard-app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">👨‍🍳 KitchenMetrics</div>
        <ul class="nav-list">
            <li class="nav-item active" data-target="principal">
                <a href="#"><span class="nav-icon">🏠</span><span class="nav-text">Principal</span></a>
            </li>
            <li class="nav-item" data-target="planificacion">
                <a href="#"><span class="nav-icon">📅</span><span class="nav-text">Planificación</span></a>
            </li>
            <li class="nav-item" data-target="mermas">
                <a href="#"><span class="nav-icon">⚠️</span><span class="nav-text">Mermas</span></a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-small">{{ nombre }}</div>
            <a href="{{ url_for('logout') }}" class="small-link">Cerrar sesión</a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="topbar">
            <h2>Panel Jefe de Cocina</h2>
            <div class="top-actions">
                <span class="badge bg-warning text-dark px-3 py-2">👨‍🍳 {{ nombre }}</span>
            </div>
        </header>

        <div class="container-fluid p-3">
            <section id="content-principal" class="content-pane">
                {% include 'includes_jc/principal_jc.html' %}
            </section>
            <section id="content-planificacion" class="content-pane d-none">
                {% include 'includes_jc/planificacion_jc.html' %}
            </section>
            <section id="content-mermas" class="content-pane d-none">
                {% include 'includes_jc/mermas_jc.html' %}
            </section>
        </div>
    </main>
</div>

<!-- Chart data blobs -->
<script id="chart-consumidas-data" type="application/json">{{ chart_consumidas|tojson }}</script>
<script id="chart-merma-data"      type="application/json">{{ chart_merma|tojson }}</script>
<script id="chart-platos-data"     type="application/json">{{ chart_platos|tojson }}</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
/* ── Sidebar navigation ── */
document.addEventListener('DOMContentLoaded', function () {
    const navItems = document.querySelectorAll('.sidebar .nav-item');
    const panes    = document.querySelectorAll('.content-pane');

    navItems.forEach(item => {
        item.addEventListener('click', function (e) {
            e.preventDefault();
            const target = this.dataset.target;
            if (!target) return;
            navItems.forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            panes.forEach(p => p.classList.add('d-none'));
            const pane = document.getElementById('content-' + target);
            if (pane) {
                pane.classList.remove('d-none');
                pane.dispatchEvent(new CustomEvent('pane:shown'));
            }
        });
        item.setAttribute('tabindex', '0');
        item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); item.click(); } });
    });

    /* ── Main charts (principal pane) ── */
    function parseJ(id) {
        const el = document.getElementById(id);
        if (!el) return {};
        try { return JSON.parse(el.textContent.trim() || '{}'); } catch { return {}; }
    }
    const ccData = parseJ('chart-consumidas-data');
    const cmData = parseJ('chart-merma-data');
    const cpData = parseJ('chart-platos-data');

    const ctxC = document.getElementById('jc-chart-consumidas');
    if (ctxC) new Chart(ctxC, { type:'bar', data:{ labels: ccData.labels||[], datasets:[
        { label:'Consumidas',    data: ccData.consumidas||[],    backgroundColor:'#27ae60', borderRadius:6 },
        { label:'No consumidas', data: ccData.no_consumidas||[], backgroundColor:'#df3320', borderRadius:6 }
    ]}, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}}, scales:{y:{beginAtZero:true}} }});

    const ctxM = document.getElementById('jc-chart-merma');
    if (ctxM) new Chart(ctxM, { type:'line', data:{ labels: cmData.labels||[], datasets:[
        { label:'% Desperdicio', data: cmData.porcentaje||[], borderColor:'#df3320', backgroundColor:'rgba(223,51,32,.05)', fill:true, tension:.3, pointRadius:4 },
        { label:'Meta',          data: cmData.meta||[],       borderColor:'#27ae60', borderDash:[5,5], borderWidth:2, pointRadius:0, fill:false }
    ]}, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}}, scales:{y:{beginAtZero:true,max:100}} }});

    const ctxP = document.getElementById('jc-chart-platos');
    if (ctxP) new Chart(ctxP, { type:'doughnut', data:{ labels: cpData.labels||['Preparados','No consumidos'], datasets:[{
        data: cpData.data||[0,0], backgroundColor:['#27ae60','#df3320'], borderColor:'#fff', borderWidth:2
    }]}, options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{legend:{position:'bottom'}} }});
});
</script>
</body>
</html>
