<!-- jefe_cocina.html -->
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KitchenMetrics – Jefe de Cocina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_dashboard.css') }}">
    <style>
        /* ── JC-specific overrides ── */
        .sidebar { background: rgba(230,126,34,0.13); border-right: 1px solid rgba(230,126,34,0.22); }
        .sidebar .brand { color: #e67e22; }
        .nav-list .nav-item.active a { background: rgba(230,126,34,0.22); border-left-color: #e67e22; }
        .topbar { background: rgba(230,126,34,0.08); }
        .topbar h2 { color: #fff; }
    </style>
</head>
<body>
<div class="dashboard-app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">👨‍🍳 KitchenMetrics</div>
        <ul class="nav-list">
            <li class="nav-item active" data-target="principal">
                <a href="#"><span class="nav-icon">🏠</span><span class="nav-text">Principal</span></a>
            </li>
            <li class="nav-item" data-target="planificacion">
                <a href="#"><span class="nav-icon">📅</span><span class="nav-text">Planificación</span></a>
            </li>
            <li class="nav-item" data-target="mermas">
                <a href="#"><span class="nav-icon">⚠️</span><span class="nav-text">Mermas</span></a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-small">{{ nombre }}</div>
            <a href="{{ url_for('logout') }}" class="small-link">Cerrar sesión</a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="topbar">
            <h2>Panel Jefe de Cocina</h2>
            <div class="top-actions">
                <span class="badge bg-warning text-dark px-3 py-2">👨‍🍳 {{ nombre }}</span>
            </div>
        </header>

        <div class="container-fluid p-3">
            <section id="content-principal" class="content-pane">
                {% include 'includes_jc/principal_jc.html' %}
            </section>
            <section id="content-planificacion" class="content-pane d-none">
                {% include 'includes_jc/planificacion_jc.html' %}
            </section>
            <section id="content-mermas" class="content-pane d-none">
                {% include 'includes_jc/mermas_jc.html' %}
            </section>
        </div>
    </main>
</div>

<!-- Chart data blobs -->
<script id="chart-consumidas-data" type="application/json">
  {{ chart_consumidas | default({}, true) | tojson }}
</script>
<script id="chart-merma-data" type="application/json">
  {{ chart_merma | default({}, true) | tojson }}
</script>
<script id="chart-platos-data" type="application/json">
  {{ chart_platos | default({}, true) | tojson }}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/validaciones_jc.js') }}"></script>
</body>
</html>
