<!-- planificacion_jc.html -->

<div class="d-flex flex-column gap-3">

  <!-- Encabezado -->
  <div class="card p-3">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
      <div>
        <h4 class="mb-1 fw-bold">📅 Planificación de Menús</h4>
        <div class="text-muted small">Gestiona los menús de los próximos 30 días. Haz clic en un día para crear o editar su menú.</div>
      </div>
      <div class="d-flex gap-2 align-items-center flex-wrap">
        <span class="d-flex align-items-center gap-1"><span class="legend-dot" style="background:#27ae60;"></span><small>Con menú</small></span>
        <span class="d-flex align-items-center gap-1"><span class="legend-dot" style="background:#e67e22;"></span><small>Hoy</small></span>
        <span class="d-flex align-items-center gap-1"><span class="legend-dot" style="background:#dee2e6;"></span><small>Sin menú</small></span>
      </div>
    </div>
  </div>

  <!-- Controles de navegación -->
  <div class="card p-3">
    <div class="d-flex justify-content-between align-items-center">
      <button class="btn btn-outline-secondary btn-sm" id="prevMonthBtn">← Mes anterior</button>
      <h5 class="mb-0" id="calMonthLabel"></h5>
      <button class="btn btn-outline-secondary btn-sm" id="nextMonthBtn">Mes siguiente →</button>
    </div>
  </div>

  <!-- Calendario -->
  <div class="card p-3">
    <div id="jc-calendar"></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════
     MODAL: Ver / Editar menú del día
════════════════════════════════════════════ -->
<div class="modal fade" id="menuDayModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header" style="background:#e67e22; color:#fff;">
        <h5 class="modal-title" id="menuDayModalTitle">Menú del día</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- Estado del menú -->
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">Fecha</label>
            <input type="text" id="modal-fecha-display" class="form-control form-control-sm" readonly>
            <input type="hidden" id="modal-fecha-iso">
            <input type="hidden" id="modal-id-menu">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Estado del Menú</label>
            <select id="modal-estado" class="form-select form-select-sm">
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
              <option value="borrador">Borrador</option>
            </select>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <div id="modal-menu-badge" class="badge fs-6 px-3 py-2">–</div>
          </div>
        </div>

        <hr>

        <!-- Platos del menú -->
        <h6 class="fw-bold mb-3">Composición del Menú</h6>
        <div class="row g-3" id="modal-platos-container">

          <div class="col-md-6">
            <label class="form-label"><span class="badge bg-primary me-1">1</span> Entrada</label>
            <select class="form-select form-select-sm modal-plato-select" data-orden="1" id="modal-plato-1"></select>
          </div>

          <div class="col-md-6">
            <label class="form-label"><span class="badge bg-warning text-dark me-1">2</span> Fondo opción 1</label>
            <select class="form-select form-select-sm modal-plato-select" data-orden="2" id="modal-plato-2"></select>
          </div>

          <div class="col-md-6">
            <label class="form-label"><span class="badge bg-warning text-dark me-1">3</span> Fondo opción 2</label>
            <select class="form-select form-select-sm modal-plato-select" data-orden="3" id="modal-plato-3"></select>
          </div>

          <div class="col-md-6">
            <label class="form-label"><span class="badge bg-warning text-dark me-1">4</span> Fondo opción 3 (Vegano)</label>
            <select class="form-select form-select-sm modal-plato-select" data-orden="4" id="modal-plato-4"></select>
          </div>

          <div class="col-md-6">
            <label class="form-label"><span class="badge bg-purple me-1" style="background:#9b59b6;">5</span> Postre</label>
            <select class="form-select form-select-sm modal-plato-select" data-orden="5" id="modal-plato-5"></select>
          </div>

        </div>

        <hr>
        <h6 class="fw-bold mb-3">Raciones Planificadas</h6>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Raciones Planificadas</label>
            <input type="number" id="modal-raciones-plan" class="form-control form-control-sm" min="1" value="100">
          </div>
          <div class="col-md-4">
            <label class="form-label">Raciones Preparadas</label>
            <input type="number" id="modal-raciones-prep" class="form-control form-control-sm" min="0" value="0">
          </div>
          <div class="col-md-4">
            <label class="form-label">Raciones Disponibles</label>
            <input type="number" id="modal-raciones-disp" class="form-control form-control-sm" min="0" value="0">
          </div>
        </div>

        <div id="modal-alert" class="alert mt-3 d-none"></div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger btn-sm d-none" id="modal-delete-btn">🗑 Eliminar Menú</button>
        <button type="button" class="btn btn-warning btn-sm" id="modal-save-btn">💾 Guardar Menú</button>
      </div>

    </div>
  </div>
</div>

<style>
.legend-dot { display:inline-block; width:12px; height:12px; border-radius:50%; }

#jc-calendar { font-family: 'Segoe UI', sans-serif; }
.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}
.cal-header-cell {
    text-align: center;
    font-weight: 700;
    font-size: .78rem;
    color: #6c757d;
    padding: 6px 0;
    text-transform: uppercase;
}
.cal-day {
    min-height: 72px;
    border-radius: 10px;
    padding: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform .15s, box-shadow .15s, border-color .15s;
    background: #f8f9fa;
    position: relative;
    user-select: none;
}
.cal-day:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.12); border-color: #e67e22; }
.cal-day.has-menu { background: #d4edda; }
.cal-day.is-today { border-color: #e67e22 !important; background: #fff3cd; }
.cal-day.is-past  { opacity: .55; cursor: default; }
.cal-day.is-past:hover { transform: none; box-shadow: none; border-color: transparent; }
.cal-day.empty    { background: transparent; cursor: default; border: none; }
.cal-day.empty:hover { transform: none; box-shadow: none; }
.cal-day-num { font-weight: 700; font-size: .95rem; color: #2c3e50; }
.cal-day.has-menu .cal-day-num { color: #155724; }
.cal-day-label { font-size: .7rem; color: #555; margin-top: 4px; }
.cal-day-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #27ae60;
    position: absolute; bottom: 8px; right: 8px;
}
</style>

<script id="menus-por-fecha-data" type="application/json">{{ menus_por_fecha | default({}, true) | tojson }}</script>
<script id="platos-list-data"     type="application/json">{{ platos_list     | default([], true) | tojson }}</script>
